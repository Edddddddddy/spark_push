name: CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_repository: ${{ steps.vars.outputs.image_repository }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image name
        id: vars
        shell: bash
        run: |
          echo "image_repository=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "image_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image_repository }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.image_tag }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: production
      url: http://${{ vars.DEPLOY_HOST }}/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Trust deploy host
        shell: bash
        run: |
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          ssh-keyscan -H "${{ vars.DEPLOY_HOST }}" >> "$HOME/.ssh/known_hosts"

      - name: Ensure remote path exists
        shell: bash
        run: |
          ssh "${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}" "mkdir -p '${{ vars.DEPLOY_PATH }}'"

      - name: Sync release manifests
        shell: bash
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'build' \
            --exclude 'logs' \
            --exclude 'deploy/.env.prod' \
            ./deploy ./sql "${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}:${{ vars.DEPLOY_PATH }}/"

      - name: Deploy on server
        shell: bash
        run: |
          ssh "${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}" "\
            cd '${{ vars.DEPLOY_PATH }}' && \
            chmod +x deploy/scripts/release_server.sh && \
            APP_IMAGE_REPOSITORY='${{ needs.build-and-push.outputs.image_repository }}' \
            APP_IMAGE_TAG='${{ needs.build-and-push.outputs.image_tag }}' \
            GHCR_USERNAME='${{ vars.GHCR_PULL_USERNAME }}' \
            GHCR_TOKEN='${{ secrets.GHCR_PULL_TOKEN }}' \
            bash deploy/scripts/release_server.sh"
