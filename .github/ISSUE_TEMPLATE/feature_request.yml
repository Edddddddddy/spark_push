name: Feature Request
description: Propose a feature or engineering improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What problem are we solving?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What do you want to change?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope And Risk
      description: Which services are affected? Any migration or deployment risk?

