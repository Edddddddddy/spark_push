x-app-image: &app-image
  image: ${APP_IMAGE_REPOSITORY:?set in deploy/.env.prod}:${APP_IMAGE_TAG:-latest}

services:
  mysql:
    image: mysql:8.0
    container_name: spark-push-mysql
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set in deploy/.env.prod}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-spark_push}
      MYSQL_USER: ${MYSQL_USER:-spark_push}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set in deploy/.env.prod}
    command:
      - mysqld
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=300
    volumes:
      - mysql-data:/var/lib/mysql
      - ../sql/schema.sql:/docker-entrypoint-initdb.d/00-schema.sql:ro
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -p"$${MYSQL_ROOT_PASSWORD}" --silent
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - backend

  redis:
    image: redis:7.2-alpine
    container_name: spark-push-redis
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - /bin/sh
      - -ec
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes --save 60 1000 --requirepass "$$REDIS_PASSWORD";
        else
          exec redis-server --appendonly yes --save 60 1000;
        fi
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -n "$$REDIS_PASSWORD" ]; then
            redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG >/dev/null;
          else
            redis-cli ping | grep PONG >/dev/null;
          fi
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend

  kafka:
    image: apache/kafka:3.8.0
    container_name: spark-push-kafka
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      KAFKA_KRAFT_CLUSTER_ID: ${KAFKA_KRAFT_CLUSTER_ID:?set in deploy/.env.prod}
      KAFKA_HEAP_OPTS: "${KAFKA_HEAP_OPTS:--Xms256m -Xmx512m}"
    command:
      - /bin/bash
      - -ec
      - |
        cat >/tmp/server.properties <<EOF
        process.roles=broker,controller
        node.id=1
        controller.quorum.voters=1@kafka:9093
        listeners=PLAINTEXT://:9092,CONTROLLER://:9093
        advertised.listeners=PLAINTEXT://kafka:9092
        listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
        controller.listener.names=CONTROLLER
        inter.broker.listener.name=PLAINTEXT
        auto.create.topics.enable=false
        offsets.topic.replication.factor=1
        transaction.state.log.replication.factor=1
        transaction.state.log.min.isr=1
        group.initial.rebalance.delay.ms=0
        num.partitions=${KAFKA_PUSH_PARTITIONS:-6}
        log.dirs=/var/lib/kafka/data
        EOF
        /opt/kafka/bin/kafka-storage.sh format -t "$$KAFKA_KRAFT_CLUSTER_ID" -c /tmp/server.properties --ignore-formatted
        exec /opt/kafka/bin/kafka-server-start.sh /tmp/server.properties
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 40s
    networks:
      - backend

  kafka-init:
    image: apache/kafka:3.8.0
    container_name: spark-push-kafka-init
    restart: "no"
    network_mode: "service:kafka"
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - -ec
      - |
        for i in $(seq 1 30); do
          timeout 5 /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 && break
          sleep 2
        done
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --create --if-not-exists --topic ${KAFKA_PUSH_TOPIC:-push_to_comet} --partitions ${KAFKA_PUSH_PARTITIONS:-6} --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --create --if-not-exists --topic ${KAFKA_BROADCAST_TOPIC:-broadcast_task} --partitions ${KAFKA_BROADCAST_PARTITIONS:-1} --replication-factor 1

  logic:
    <<: *app-image
    pull_policy: always
    container_name: spark-push-logic
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SPARK_SERVICE: logic
      LOGIC_GRPC_PORT: ${LOGIC_GRPC_PORT:-9100}
      LOGIC_HTTP_PORT: ${LOGIC_HTTP_PORT:-9101}
      LOGIC_HTTP_THREADS: ${LOGIC_HTTP_THREADS:-4}
      KAFKA_BROKERS: kafka:9092
      KAFKA_PUSH_TOPIC: ${KAFKA_PUSH_TOPIC:-push_to_comet}
      KAFKA_BROADCAST_TOPIC: ${KAFKA_BROADCAST_TOPIC:-broadcast_task}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_POOL_SIZE: ${REDIS_POOL_SIZE:-16}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-spark_push}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-spark_push}
      MYSQL_POOL_SIZE: ${MYSQL_POOL_SIZE:-16}
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:${LOGIC_HTTP_PORT:-9101}/health >/dev/null || exit 1
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - logic-logs:/app/logs
    expose:
      - "${LOGIC_GRPC_PORT:-9100}"
      - "${LOGIC_HTTP_PORT:-9101}"
    networks:
      - backend

  comet:
    <<: *app-image
    pull_policy: always
    container_name: spark-push-comet
    restart: unless-stopped
    depends_on:
      logic:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SPARK_SERVICE: comet
      LOGIC_GRPC_TARGET: logic:${LOGIC_GRPC_PORT:-9100}
      COMET_ID: ${COMET_ID:-comet-1}
      COMET_WS_PORT: ${COMET_WS_PORT:-9200}
      COMET_GRPC_PORT: ${COMET_GRPC_PORT:-9205}
      COMET_IO_THREADS: ${COMET_IO_THREADS:-8}
      COMET_GRPC_POOL_SIZE: ${COMET_GRPC_POOL_SIZE:-4}
      USE_GRPC_STREAM: ${USE_GRPC_STREAM:-true}
      GRPC_STREAM_COUNT: ${GRPC_STREAM_COUNT:-4}
    healthcheck:
      test:
        - CMD-SHELL
        - "bash -lc ': >/dev/tcp/127.0.0.1/${COMET_WS_PORT:-9200}'"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - comet-logs:/app/logs
    expose:
      - "${COMET_WS_PORT:-9200}"
      - "${COMET_GRPC_PORT:-9205}"
    networks:
      - backend

  job:
    <<: *app-image
    pull_policy: always
    container_name: spark-push-job
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      comet:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SPARK_SERVICE: job
      KAFKA_BROKERS: kafka:9092
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-spark_push_group}
      KAFKA_PUSH_TOPIC: ${KAFKA_PUSH_TOPIC:-push_to_comet}
      KAFKA_BROADCAST_TOPIC: ${KAFKA_BROADCAST_TOPIC:-broadcast_task}
      COMET_TARGETS: ${COMET_ID:-comet-1}=comet:${COMET_GRPC_PORT:-9205}
      USE_PUSH_STREAM: ${USE_PUSH_STREAM:-false}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-spark_push}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-spark_push}
      JOB_MYSQL_POOL_SIZE: ${JOB_MYSQL_POOL_SIZE:-8}
      JOB_RPC_WORKER_THREADS: ${JOB_RPC_WORKER_THREADS:-8}
    healthcheck:
      test:
        - CMD-SHELL
        - pgrep -f job_server >/dev/null || exit 1
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - job-logs:/app/logs
    networks:
      - backend

  web-demo:
    <<: *app-image
    pull_policy: always
    container_name: spark-push-web-demo
    restart: unless-stopped
    depends_on:
      logic:
        condition: service_healthy
      comet:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SPARK_SERVICE: web-demo
      WEB_DEMO_PORT: ${WEB_DEMO_PORT:-9001}
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:${WEB_DEMO_PORT:-9001}/index.html >/dev/null || exit 1
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    expose:
      - "${WEB_DEMO_PORT:-9001}"
    networks:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: spark-push-nginx
    restart: unless-stopped
    depends_on:
      logic:
        condition: service_healthy
      comet:
        condition: service_healthy
      web-demo:
        condition: service_healthy
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/spark-push.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O - http://127.0.0.1/ >/dev/null 2>&1 || exit 1
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  kafka-data:
  logic-logs:
  comet-logs:
  job-logs:
